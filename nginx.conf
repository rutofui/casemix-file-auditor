upstream streamlit {
    server localhost:8501;
}

server {
    listen 80;
    server_name casemix.ahmadluthfi.online;
    client_max_body_size 200M;

    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name casemix.ahmadluthfi.online;
    client_max_body_size 200M;

    # SSL certificates (update paths as needed)
    ssl_certificate /etc/letsencrypt/live/casemix.ahmadluthfi.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/casemix.ahmadluthfi.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://streamlit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /_stcore/stream {
        proxy_pass http://streamlit/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
