name: Release Metadata

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  update-build-info:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write BUILD_INFO.json
        run: python3 scripts/write_build_info.py

      - name: Commit BUILD_INFO.json if changed
        run: |
          if git diff --quiet BUILD_INFO.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add BUILD_INFO.json
          git commit -m "chore: update BUILD_INFO.json"
          git push
