version: '3.8'

services:
  casemix:
    build: .
    container_name: casemix-app
    ports:
      - "8501:8501"
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_LOGGER_LEVEL=warning
    volumes:
      - ./data:/app/data
    networks:
      - casemix-network

networks:
  casemix-network:
    driver: bridge
